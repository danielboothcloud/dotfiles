name: kubectl
description: "Kubernetes command-line tool"
version: "1.0"

aliases:
  - kb

overview: |
  kubectl - Kubernetes command-line tool for cluster management.
  More information: https://kubernetes.io/docs/reference/kubectl/

  Get cluster info:
    kubectl cluster-info

  List resources:
    kubectl get pods
    kubectl get deployments
    kubectl get services

  View resource details:
    kubectl describe pod <pod-name>

  View logs:
    kubectl logs <pod-name>
    kubectl logs -f <pod-name>

  Execute commands in a pod:
    kubectl exec -it <pod-name> -- sh

  Apply configuration:
    kubectl apply -f <file.yaml>

  Switch context:
    kubectl config use-context <context-name>

  Extensions used:
    kubectl ctx - Switch contexts (kubectx)
    kubectl ns - Switch namespaces (kubens)
    kubectl tree - Show resource hierarchy

commands:
  - name: "get"
    description: "Get resources from the cluster"
    examples:
      - cmd: "kubectl get pods"
        description: "List pods in current namespace"
      - cmd: "kubectl get pods -A"
        description: "List pods in all namespaces"
      - cmd: "kubectl get pods -o wide"
        description: "List pods with more details (node, IP)"
      - cmd: "kubectl get pods --field-selector=status.phase=Running"
        description: "List only running pods"
      - cmd: "kubectl get deployments"
        description: "List deployments in current namespace"
      - cmd: "kubectl get deployments -A"
        description: "List all deployments"
      - cmd: "kubectl get svc"
        description: "List services"
      - cmd: "kubectl get nodes"
        description: "List all nodes"
      - cmd: "kubectl get namespaces"
        description: "List all namespaces"
    related:
      - "describe"
    notes: |
      Use -w or --watch to stream updates.
      Common output formats: -o json, -o yaml, -o wide, -o name

  - name: "describe"
    description: "Show detailed information about resources"
    examples:
      - cmd: "kubectl describe pod <pod-name>"
        description: "Show pod details"
      - cmd: "kubectl describe pod <pod-name> -n <namespace>"
        description: "Describe pod in specific namespace"
      - cmd: "kubectl describe node <node-name>"
        description: "Show node details"
      - cmd: "kubectl describe deployment <deployment-name>"
        description: "Show deployment details"
    related:
      - "get"
      - "logs"

  - name: "logs"
    description: "View pod logs"
    examples:
      - cmd: "kubectl logs <pod-name>"
        description: "Show logs from pod"
      - cmd: "kubectl logs <pod-name> -f"
        description: "Stream logs (follow)"
      - cmd: "kubectl logs <pod-name> --tail=100"
        description: "Show last 100 lines"
      - cmd: "kubectl logs <pod-name> -c <container-name>"
        description: "Logs from specific container"
      - cmd: "kubectl logs <pod-name> --previous"
        description: "Logs from previous instance (after crash)"
    related:
      - "describe"
      - "exec"
    notes: |
      Use -f to follow logs in real-time.
      Use --previous to see logs from crashed containers.

  - name: "exec"
    description: "Execute command in a pod"
    examples:
      - cmd: "kubectl exec <pod-name> -- <command>"
        description: "Run command in pod"
      - cmd: "kubectl exec -it <pod-name> -- /bin/bash"
        description: "Get interactive shell in pod"
      - cmd: "kubectl exec -it <pod-name> -- sh"
        description: "Get shell (when bash not available)"
      - cmd: "kubectl exec <pod-name> -c <container> -- <command>"
        description: "Run command in specific container"
    related:
      - "logs"

  - name: "config"
    description: "Manage kubectl configuration"
    examples:
      - cmd: "kubectl config get-contexts"
        description: "List all contexts"
      - cmd: "kubectl config current-context"
        description: "Show current context"
      - cmd: "kubectl config use-context <context-name>"
        description: "Switch to different context"
      - cmd: "kubectl config set-context --current --namespace=<namespace>"
        description: "Set default namespace for current context"

  - name: "apply"
    description: "Apply configuration from file"
    examples:
      - cmd: "kubectl apply -f <file.yaml>"
        description: "Apply configuration from file"
      - cmd: "kubectl apply -f <directory>/"
        description: "Apply all configs in directory"
    related:
      - "delete"

  - name: "delete"
    description: "Delete resources"
    examples:
      - cmd: "kubectl delete pod <pod-name>"
        description: "Delete a pod"
      - cmd: "kubectl delete -f <file.yaml>"
        description: "Delete resources defined in file"

  - name: "scale"
    description: "Scale deployments"
    examples:
      - cmd: "kubectl scale deployment <name> --replicas=<count>"
        description: "Scale deployment to specific replica count"

  - name: "port-forward"
    description: "Forward local port to pod"
    examples:
      - cmd: "kubectl port-forward <pod-name> <local-port>:<pod-port>"
        description: "Forward local port to pod port"
      - cmd: "kubectl port-forward svc/<service-name> <local-port>:<service-port>"
        description: "Forward local port to service"

  - name: "ctx"
    description: "Switch Kubernetes contexts (kubectx)"
    examples:
      - cmd: "kubectl ctx"
        description: "List all contexts"
      - cmd: "kubectl ctx <context-name>"
        description: "Switch to context"
      - cmd: "kubectl ctx -"
        description: "Switch to previous context"
      - cmd: "kubectl ctx <new-name>=<old-name>"
        description: "Rename a context"
      - cmd: "kubectl ctx <new-name>=."
        description: "Rename current context"
    related:
      - "config"
      - "ns"
    notes: |
      kubectx is faster than 'kubectl config use-context'

  - name: "ns"
    description: "Switch namespaces (kubens)"
    examples:
      - cmd: "kubectl ns"
        description: "List all namespaces"
      - cmd: "kubectl ns <namespace>"
        description: "Switch to namespace"
      - cmd: "kubectl ns -"
        description: "Switch to previous namespace"
    related:
      - "config"
      - "ctx"
    notes: |
      kubens is faster than 'kubectl config set-context --current --namespace'

  - name: "tree"
    description: "Show resource hierarchy (kubectl-tree)"
    examples:
      - cmd: "kubectl tree"
        description: "Show resource tree for current namespace"
      - cmd: "kubectl tree -n <namespace>"
        description: "Show resource tree for specific namespace"
      - cmd: "kubectl tree -debug"
        description: "Show tree with debug output"
    related:
      - "get"
      - "describe"
    notes: |
      Shows parent-child relationships between resources in the namespace

resources:
  - name: "Official Docs"
    url: "https://kubernetes.io/docs/reference/kubectl/"
  - name: "Kubectl Cheat Sheet"
    url: "https://kubernetes.io/docs/reference/kubectl/cheatsheet/"
