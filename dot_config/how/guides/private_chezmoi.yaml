name: chezmoi
description: "Manage your dotfiles across multiple machines"
version: "1.0"

aliases:
  - dotfiles

overview: |
  A multi-machine dotfile manager, written in Go.
  See also: stow, tuckr, vcsh, homeshick.
  More information: https://www.chezmoi.io/reference/.

  Setup up chezmoi, creating a Git repository in ~/.local/share/chezmoi:
    chezmoi init

  Set up chezmoi from existing dotfiles of a Git repository:
    chezmoi init repository_url

  Start tracking one or more dotfiles:
    chezmoi add path/to/dotfile1 path/to/dotfile2 ...

  Update repository with local changes:
    chezmoi re-add path/to/dotfile1 path/to/dotfile2 ...

  Edit the source state of a tracked dotfile:
    chezmoi edit path/to/dotfile_or_symlink

  See pending changes:
    chezmoi diff

  Apply the changes:
    chezmoi -v apply

  Pull changes from a remote repository and apply them:
    chezmoi update

commands:
  - name: "status"
    description: "Check what would change"
    examples:
      - cmd: "chezmoi diff"
        description: "See what would change"
      - cmd: "chezmoi status"
        description: "Show status of managed files"
    related:
      - "apply"
    notes: |
      Use 'diff' to see actual changes.
      Use 'status' for a quick overview.

  - name: "apply"
    description: "Apply changes to home directory"
    examples:
      - cmd: "chezmoi apply"
        description: "Apply all changes"
      - cmd: "chezmoi apply -v"
        description: "Apply changes verbosely"
      - cmd: "chezmoi apply --dry-run"
        description: "Show what would happen without applying"
    related:
      - "status"
      - "edit"
    notes: |
      Always run 'chezmoi diff' before apply to review changes.
      Use --dry-run to test without making changes.

  - name: "edit"
    description: "Edit a managed file"
    examples:
      - cmd: "chezmoi edit ~/.zshrc"
        description: "Edit zshrc in source directory"
      - cmd: "chezmoi edit --apply ~/.zshrc"
        description: "Edit and apply changes immediately"
      - cmd: "ded"
        description: "Interactive fzf selector to edit managed files"
    related:
      - "apply"
      - "add"
    notes: |
      Opens the source file in $EDITOR.
      Changes are not applied until you run 'chezmoi apply'.
      The 'ded' alias uses fzf for interactive file selection and auto-applies.

  - name: "add"
    description: "Add new file to chezmoi"
    examples:
      - cmd: "chezmoi add ~/.config/newfile"
        description: "Start managing a new file"
      - cmd: "chezmoi add --template ~/.gitconfig"
        description: "Add file as a template"
    related:
      - "edit"
      - "remove"
    notes: |
      Files are copied to chezmoi source directory.
      Use --template for files with dynamic content.

  - name: "remove"
    description: "Stop managing a file"
    examples:
      - cmd: "chezmoi remove ~/.oldfile"
        description: "Stop managing a file"
    related:
      - "add"

  - name: "update"
    description: "Pull and apply latest changes"
    examples:
      - cmd: "chezmoi update"
        description: "Pull latest changes from git and apply"
      - cmd: "chezmoi update -v"
        description: "Update verbosely"
    notes: |
      Equivalent to: git pull && chezmoi apply.
      Only works if source directory is a git repo.

  - name: "cd"
    description: "Change to source directory"
    examples:
      - cmd: "chezmoi cd"
        description: "Open shell in source directory"
    notes: |
      Useful for running git commands manually.
      Source directory: /Users/danielbooth/projects/home/dotfiles

  - name: "managed"
    description: "List all managed files"
    examples:
      - cmd: "chezmoi managed"
        description: "List all managed files"
      - cmd: "chezmoi managed -i files"
        description: "List only files (with full paths)"
    related:
      - "status"

resources:
  - name: "Official Docs"
    url: "https://www.chezmoi.io/quick-start/"
  - name: "User Guide"
    url: "https://www.chezmoi.io/user-guide/command-overview/"
