name: clones
description: "Interactive repository cloning and management tool"
version: "1.0"

overview: |
  clones

  Interactive repository cloning and management tool.
  Browse, clone, and navigate between local and remote repositories from GitHub and GitLab.

  Browse all repositories (remote + local merged):

    clones

  Filter repositories by name:

    clones terraform

  Browse only local repositories:

    clones --local

  Browse only remote repositories:

    clones --remote

  Filter by platform (GitHub or GitLab):

    clones --platform gitlab

  Browse only local GitLab repositories:

    clones --local --platform gitlab

commands:
  - name: "browse"
    description: "Browse and select repositories"
    examples:
      - cmd: "clones"
        description: "Browse all repos (remote + local)"
      - cmd: "clones <filter>"
        description: "Filter repos by name"
      - cmd: "clones terraform"
        description: "Show repos matching 'terraform'"

  - name: "-l/--local"
    description: "Local repositories only"
    examples:
      - cmd: "clones -l"
        description: "Browse only local repos"
      - cmd: "clones -l <filter>"
        description: "Filter local repos"

  - name: "-r/--remote"
    description: "Remote repositories only"
    examples:
      - cmd: "clones -r"
        description: "Browse only remote repos (not cloned locally)"
      - cmd: "clones -r <filter>"
        description: "Filter remote repos"

  - name: "--platform"
    description: "Filter by platform"
    examples:
      - cmd: "clones --platform github"
        description: "Show only GitHub repos"
      - cmd: "clones --platform gitlab"
        description: "Show only GitLab repos"
      - cmd: "clones -l --platform gitlab"
        description: "Show only local GitLab repos"
    notes: |
      Platforms: github, gitlab
