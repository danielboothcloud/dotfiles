name: glab
description: "GitLab CLI - Work seamlessly with GitLab from the terminal"
version: "1.0"

overview: |
  Work seamlessly with GitLab.
  Some subcommands such as config have their own usage documentation.
  More information: https://gitlab.com/gitlab-org/cli/-/tree/main/docs/source.

  Clone a GitLab repository locally:
    glab repo clone owner/repository

  Create a new issue:
    glab issue create

  View and filter the open issues of the current repository:
    glab issue list

  View an issue in the default browser:
    glab issue view --web issue_number

  Create a merge request:
    glab mr create

  View a pull request in the default web browser:
    glab mr view --web pr_number

  Check out a specific pull request locally:
    glab mr checkout pr_number

commands:
  - name: "auth"
    description: "Manage glab's authentication state"
    examples:
      - cmd: "glab auth login"
        description: "Authenticate with GitLab instance"
      - cmd: "glab auth status"
        description: "View authentication status"
      - cmd: "glab auth logout"
        description: "Logout from GitLab instance"
    notes: |
      Required before using glab
      Stores credentials securely

  - name: "repo"
    description: "Work with GitLab repositories and projects"
    examples:
      - cmd: "glab repo clone <repo>"
        description: "Clone a repository"
      - cmd: "glab repo clone -g <group>"
        description: "Clone all repos from a group"
      - cmd: "glab repo create [path]"
        description: "Create a new repository"
      - cmd: "glab repo view"
        description: "View current repository"
      - cmd: "glab repo view <repository>"
        description: "View specific repository"
      - cmd: "glab repo fork <repo>"
        description: "Fork a repository"
      - cmd: "glab repo list"
        description: "List repositories"
      - cmd: "glab repo delete <name>"
        description: "Delete a repository"
    related:
      - "issue"
      - "mr"
    notes: |
      Use -R flag to specify repository for other commands

  - name: "issue"
    description: "Work with GitLab issues"
    examples:
      - cmd: "glab issue list"
        description: "List issues in current repository"
      - cmd: "glab issue create"
        description: "Create a new issue interactively"
      - cmd: "glab issue create --label bugfix --confidential"
        description: "Create issue with label and confidential flag"
      - cmd: "glab issue view <id>"
        description: "View issue details"
      - cmd: "glab issue view --web <id>"
        description: "Open issue in browser"
      - cmd: "glab issue close <id>"
        description: "Close an issue"
      - cmd: "glab issue reopen <id>"
        description: "Reopen a closed issue"
      - cmd: "glab issue note <id> -m \"comment text\""
        description: "Add a comment to an issue"
      - cmd: "glab issue update <id>"
        description: "Update an issue"
      - cmd: "glab issue delete <id>"
        description: "Delete an issue"
    related:
      - "mr"
      - "label"
    notes: |
      Subcommands: list, create, view, close, reopen, note, update, delete
      Use --web to open in browser

  - name: "mr"
    description: "Create, view, and manage merge requests"
    examples:
      - cmd: "glab mr list"
        description: "List merge requests"
      - cmd: "glab mr create"
        description: "Create merge request interactively"
      - cmd: "glab mr create --fill --label bugfix"
        description: "Create MR with auto-filled info and label"
      - cmd: "glab mr view <id>"
        description: "View merge request details"
      - cmd: "glab mr view --web <id>"
        description: "Open merge request in browser"
      - cmd: "glab mr checkout <id>"
        description: "Checkout merge request locally"
      - cmd: "glab mr approve <id>"
        description: "Approve a merge request"
      - cmd: "glab mr merge <id>"
        description: "Merge a merge request"
      - cmd: "glab mr close <id>"
        description: "Close a merge request"
      - cmd: "glab mr reopen <id>"
        description: "Reopen a merge request"
      - cmd: "glab mr note <id> -m \"comment text\""
        description: "Add comment to merge request"
      - cmd: "glab mr diff <id>"
        description: "View changes in merge request"
      - cmd: "glab mr for"
        description: "Create MR for an issue"
    related:
      - "issue"
      - "ci"
    notes: |
      Can use MR ID, branch name, or URL
      Use --fill to auto-fill from commits
      Use --web to open in browser

  - name: "ci"
    description: "Work with GitLab CI/CD pipelines and jobs"
    examples:
      - cmd: "glab ci status"
        description: "View pipeline status for current branch"
      - cmd: "glab ci view"
        description: "View current pipeline"
      - cmd: "glab ci list"
        description: "List all pipelines"
      - cmd: "glab ci run"
        description: "Run a new pipeline"
      - cmd: "glab ci trace <job-id>"
        description: "Trace job log in real time"
      - cmd: "glab ci retry <job-id>"
        description: "Retry a failed job"
      - cmd: "glab ci cancel"
        description: "Cancel running pipeline"
      - cmd: "glab ci lint"
        description: "Validate .gitlab-ci.yml file"
      - cmd: "glab ci artifact <refName> <jobName>"
        description: "Download artifacts from last pipeline"
    related:
      - "mr"
    notes: |
      Useful for monitoring and managing CI/CD pipelines
      Use trace to watch logs in real-time

  - name: "release"
    description: "Manage GitLab releases"
    examples:
      - cmd: "glab release list"
        description: "List all releases"
      - cmd: "glab release view <tag>"
        description: "View release details"
      - cmd: "glab release create <tag>"
        description: "Create a new release"
      - cmd: "glab release create <tag> <files>"
        description: "Create release with assets"
      - cmd: "glab release upload <tag> <files>"
        description: "Upload assets to existing release"
      - cmd: "glab release download <tag>"
        description: "Download release assets"
      - cmd: "glab release delete <tag>"
        description: "Delete a release"
    related:
      - "repo"
    notes: |
      Tags must exist before creating release

  - name: "label"
    description: "Manage labels on remote"
    examples:
      - cmd: "glab label list"
        description: "List all labels"
      - cmd: "glab label create <name>"
        description: "Create a new label"
      - cmd: "glab label delete <name>"
        description: "Delete a label"
    related:
      - "issue"
      - "mr"

  - name: "milestone"
    description: "Manage group or project milestones"
    examples:
      - cmd: "glab milestone list"
        description: "List milestones"
      - cmd: "glab milestone view <id>"
        description: "View milestone details"
      - cmd: "glab milestone create"
        description: "Create a milestone"
    related:
      - "issue"
      - "mr"

  - name: "variable"
    description: "Manage variables for a GitLab project or group"
    examples:
      - cmd: "glab variable list"
        description: "List all variables"
      - cmd: "glab variable set <key> <value>"
        description: "Set a variable"
      - cmd: "glab variable get <key>"
        description: "Get variable value"
      - cmd: "glab variable delete <key>"
        description: "Delete a variable"
    related:
      - "ci"
    notes: |
      CI/CD variables for pipelines

  - name: "api"
    description: "Make authenticated GitLab API requests"
    examples:
      - cmd: "glab api <endpoint>"
        description: "Make GET request to API endpoint"
      - cmd: "glab api projects/:id/issues"
        description: "Get project issues via API"
    notes: |
      For advanced usage and custom API calls

  - name: "config"
    description: "Manage glab settings"
    examples:
      - cmd: "glab config get <key>"
        description: "Get config value"
      - cmd: "glab config set <key> <value>"
        description: "Set config value"
    notes: |
      Configure glab behavior and defaults

resources:
  - name: "Official Docs"
    url: "https://gitlab.com/gitlab-org/cli"
  - name: "Command Reference"
    url: "https://gitlab.com/gitlab-org/cli/-/tree/main/docs/source"
