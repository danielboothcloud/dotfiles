name: gh
description: "GitHub CLI - Work seamlessly with GitHub from the terminal"
version: "1.0"

overview: |
  Work seamlessly with GitHub.
  Some subcommands such as config have their own usage documentation.
  More information: https://cli.github.com/manual/gh.

  Clone a GitHub repository locally:
    gh repo clone owner/repository

  Create a new issue:
    gh issue create

  View and filter the open issues of the current repository:
    gh issue list

  View an issue in the default web browser:
    gh issue view --web issue_number|url

  Create a pull request:
    gh pr create

  View a pull request in the default web browser:
    gh pr view --web pr_number|url|branch

  Check out a specific pull request locally:
    gh pr checkout pr_number|url|branch

  Check the status of a repository's pull requests:
    gh pr status

commands:
  - name: "auth"
    description: "Authenticate gh and git with GitHub"
    examples:
      - cmd: "gh auth login"
        description: "Log in to GitHub account"
      - cmd: "gh auth status"
        description: "Check authentication status"
      - cmd: "gh auth logout"
        description: "Log out of GitHub account"
      - cmd: "gh auth refresh"
        description: "Refresh stored credentials"
      - cmd: "gh auth token"
        description: "Print authentication token"
    notes: |
      Required before using gh
      Supports multiple accounts

  - name: "repo"
    description: "Work with GitHub repositories"
    examples:
      - cmd: "gh repo clone <owner/repo>"
        description: "Clone a repository"
      - cmd: "gh repo create"
        description: "Create a new repository interactively"
      - cmd: "gh repo create <name>"
        description: "Create repository with name"
      - cmd: "gh repo view"
        description: "View current repository"
      - cmd: "gh repo view --web"
        description: "Open repository in browser"
      - cmd: "gh repo fork"
        description: "Fork current repository"
      - cmd: "gh repo fork <owner/repo>"
        description: "Fork a specific repository"
      - cmd: "gh repo list <owner>"
        description: "List repositories for user or org"
      - cmd: "gh repo delete <owner/repo>"
        description: "Delete a repository"
      - cmd: "gh repo archive <owner/repo>"
        description: "Archive a repository"
      - cmd: "gh repo sync"
        description: "Sync fork with upstream"
    related:
      - "issue"
      - "pr"
    notes: |
      Use -R flag to specify repository for other commands

  - name: "issue"
    description: "Work with GitHub issues"
    examples:
      - cmd: "gh issue list"
        description: "List issues in current repository"
      - cmd: "gh issue list --state all"
        description: "List all issues including closed"
      - cmd: "gh issue create"
        description: "Create a new issue interactively"
      - cmd: "gh issue create --label bug --title \"Bug title\""
        description: "Create issue with label and title"
      - cmd: "gh issue view <number>"
        description: "View issue details"
      - cmd: "gh issue view --web <number>"
        description: "Open issue in browser"
      - cmd: "gh issue close <number>"
        description: "Close an issue"
      - cmd: "gh issue reopen <number>"
        description: "Reopen a closed issue"
      - cmd: "gh issue comment <number>"
        description: "Add a comment to an issue"
      - cmd: "gh issue edit <number>"
        description: "Edit an issue"
      - cmd: "gh issue delete <number>"
        description: "Delete an issue"
      - cmd: "gh issue status"
        description: "Show status of relevant issues"
    related:
      - "pr"
      - "label"
    notes: |
      Can use issue number or URL as argument
      Use --web to open in browser

  - name: "pr"
    description: "Work with GitHub pull requests"
    examples:
      - cmd: "gh pr list"
        description: "List pull requests"
      - cmd: "gh pr status"
        description: "Show status of relevant PRs"
      - cmd: "gh pr create"
        description: "Create pull request interactively"
      - cmd: "gh pr create --fill"
        description: "Create PR with auto-filled info from commits"
      - cmd: "gh pr view <number>"
        description: "View pull request details"
      - cmd: "gh pr view --web <number>"
        description: "Open pull request in browser"
      - cmd: "gh pr checkout <number>"
        description: "Check out a pull request locally"
      - cmd: "gh pr diff <number>"
        description: "View changes in pull request"
      - cmd: "gh pr checks <number>"
        description: "Show CI status for pull request"
      - cmd: "gh pr review <number>"
        description: "Review a pull request"
      - cmd: "gh pr review --approve <number>"
        description: "Approve a pull request"
      - cmd: "gh pr merge <number>"
        description: "Merge a pull request"
      - cmd: "gh pr close <number>"
        description: "Close a pull request"
      - cmd: "gh pr reopen <number>"
        description: "Reopen a pull request"
      - cmd: "gh pr comment <number>"
        description: "Add comment to pull request"
      - cmd: "gh pr ready <number>"
        description: "Mark PR as ready for review"
    related:
      - "issue"
      - "workflow"
    notes: |
      Can use PR number, URL, or branch name
      Use --fill to auto-fill from commits
      Use --web to open in browser

  - name: "release"
    description: "Manage GitHub releases"
    examples:
      - cmd: "gh release list"
        description: "List all releases"
      - cmd: "gh release view <tag>"
        description: "View release details"
      - cmd: "gh release create <tag>"
        description: "Create a new release"
      - cmd: "gh release create <tag> <files>"
        description: "Create release with assets"
      - cmd: "gh release upload <tag> <files>"
        description: "Upload assets to existing release"
      - cmd: "gh release download <tag>"
        description: "Download release assets"
      - cmd: "gh release delete <tag>"
        description: "Delete a release"
      - cmd: "gh release edit <tag>"
        description: "Edit a release"
    related:
      - "repo"
    notes: |
      Tags must exist before creating release

  - name: "workflow"
    description: "View and run GitHub Actions workflows"
    examples:
      - cmd: "gh workflow list"
        description: "List workflows"
      - cmd: "gh workflow view <workflow>"
        description: "View workflow details"
      - cmd: "gh workflow run <workflow>"
        description: "Trigger a workflow run"
      - cmd: "gh workflow enable <workflow>"
        description: "Enable a workflow"
      - cmd: "gh workflow disable <workflow>"
        description: "Disable a workflow"
    related:
      - "run"
      - "pr"
    notes: |
      Manage GitHub Actions workflows

  - name: "run"
    description: "View details about workflow runs"
    examples:
      - cmd: "gh run list"
        description: "List recent workflow runs"
      - cmd: "gh run view <run-id>"
        description: "View workflow run details"
      - cmd: "gh run watch <run-id>"
        description: "Watch workflow run in real-time"
      - cmd: "gh run rerun <run-id>"
        description: "Rerun a workflow"
      - cmd: "gh run cancel <run-id>"
        description: "Cancel a workflow run"
      - cmd: "gh run download <run-id>"
        description: "Download artifacts from run"
    related:
      - "workflow"
      - "pr"
    notes: |
      View and manage GitHub Actions runs

  - name: "gist"
    description: "Manage GitHub gists"
    examples:
      - cmd: "gh gist create <files>"
        description: "Create a new gist"
      - cmd: "gh gist list"
        description: "List your gists"
      - cmd: "gh gist view <gist-id>"
        description: "View a gist"
      - cmd: "gh gist edit <gist-id>"
        description: "Edit a gist"
      - cmd: "gh gist delete <gist-id>"
        description: "Delete a gist"
    notes: |
      Create and manage code snippets

  - name: "label"
    description: "Manage GitHub labels"
    examples:
      - cmd: "gh label list"
        description: "List all labels"
      - cmd: "gh label create <name>"
        description: "Create a new label"
      - cmd: "gh label delete <name>"
        description: "Delete a label"
    related:
      - "issue"
      - "pr"

  - name: "secret"
    description: "Manage GitHub secrets"
    examples:
      - cmd: "gh secret list"
        description: "List all secrets"
      - cmd: "gh secret set <name>"
        description: "Set a secret value"
      - cmd: "gh secret delete <name>"
        description: "Delete a secret"
    related:
      - "workflow"
    notes: |
      Manage GitHub Actions secrets

  - name: "variable"
    description: "Manage GitHub Actions variables"
    examples:
      - cmd: "gh variable list"
        description: "List all variables"
      - cmd: "gh variable set <name> --body <value>"
        description: "Set a variable"
      - cmd: "gh variable delete <name>"
        description: "Delete a variable"
    related:
      - "workflow"
      - "secret"

  - name: "api"
    description: "Make authenticated GitHub API requests"
    examples:
      - cmd: "gh api <endpoint>"
        description: "Make GET request to API endpoint"
      - cmd: "gh api repos/:owner/:repo/issues"
        description: "Get repository issues via API"
      - cmd: "gh api -X POST <endpoint>"
        description: "Make POST request"
    notes: |
      For advanced usage and custom API calls

  - name: "browse"
    description: "Open repository in browser"
    examples:
      - cmd: "gh browse"
        description: "Open current repository in browser"
      - cmd: "gh browse <owner/repo>"
        description: "Open specific repository"
      - cmd: "gh browse --settings"
        description: "Open repository settings"
    notes: |
      Quickly open GitHub pages in browser

  - name: "status"
    description: "Show relevant issues, PRs, and notifications"
    examples:
      - cmd: "gh status"
        description: "Show status across repositories"
    notes: |
      Overview of your activity across repos

  - name: "config"
    description: "Manage gh configuration"
    examples:
      - cmd: "gh config get <key>"
        description: "Get config value"
      - cmd: "gh config set <key> <value>"
        description: "Set config value"
      - cmd: "gh config list"
        description: "List all config values"
    notes: |
      Configure gh behavior and defaults

resources:
  - name: "Official Manual"
    url: "https://cli.github.com/manual"
  - name: "Command Reference"
    url: "https://cli.github.com/manual/gh"
