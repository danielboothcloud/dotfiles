name: op
description: "1Password CLI - Manage secrets and passwords from the terminal"
version: "1.0"

aliases:
  - 1p

overview: |
  Official CLI for 1Password's desktop app.
  More information: https://developer.1password.com/docs/cli/reference/.

  Sign in to a 1Password account:
    op signin

  List all vaults:
    op vault list

  Print item details in JSON format:
    op item get item_name --format json

  Create a new item with a category in the default vault:
    op item create --category category_name

  Print a referenced secret to stdout:
    op read secret_reference

  Pass secret references from exported environment variables to a command:
    op run -- command

  Pass secret references from an environment file to a command:
    op run --env-file path/to/env_file.env -- command

  Read secret references from a file and save plaintext secrets to a file:
    op inject --in-file path/to/input_file --out-file path/to/output_file

commands:
  - name: "item"
    description: "Manage items in your vaults"
    examples:
      - cmd: "op item get <item-name>"
        description: "Get item details"
      - cmd: "op item list"
        description: "List all items"
      - cmd: "op item create --category <category>"
        description: "Create new item"
      - cmd: "op item edit <item-name> field=value"
        description: "Edit an item"
      - cmd: "op item delete <item-name>"
        description: "Delete an item"
      - cmd: "op item move <item-name> <vault>"
        description: "Move item to different vault"
      - cmd: "op item share <item-name>"
        description: "Share an item"
    related:
      - "vault"
      - "read"
    notes: |
      Subcommands: get, list, create, edit, delete, move, share
      Categories: Login, Password, API Credential, SSH Key, Database, etc.

  - name: "vault"
    description: "Manage your vaults"
    examples:
      - cmd: "op vault list"
        description: "List all vaults"
      - cmd: "op vault get <vault-name>"
        description: "Get vault details"
      - cmd: "op vault create <vault-name>"
        description: "Create a new vault"
      - cmd: "op vault edit <vault-name>"
        description: "Edit vault details"
      - cmd: "op vault delete <vault-name>"
        description: "Delete a vault"
    related:
      - "item"
    notes: |
      Subcommands: list, get, create, edit, delete
      Also: vault group, vault user (manage permissions)

  - name: "read"
    description: "Read a secret from 1Password"
    examples:
      - cmd: "op read \"op://vault/item/password\""
        description: "Read a password field"
      - cmd: "op read \"op://vault/item/one-time password?attribute=otp\""
        description: "Get a one-time password"
      - cmd: "op read \"op://vault/ssh key/private key?ssh-format=openssh\""
        description: "Get SSH key in OpenSSH format"
      - cmd: "op read --out-file ./key.pem \"op://vault/server/ssh/key.pem\""
        description: "Save secret to a file"
      - cmd: "docker login -u $(op read op://prod/docker/username) -p $(op read op://prod/docker/password)"
        description: "Use in a command"
    related:
      - "inject"
      - "run"
    notes: |
      Secret references use format: op://vault/item/field
      Use quotes when references contain spaces or special characters

  - name: "inject"
    description: "Inject secrets into a config file"
    examples:
      - cmd: "echo \"password: {{ op://vault/db/password }}\" | op inject"
        description: "Inject from stdin"
      - cmd: "op inject -i config.yml.tpl -o config.yml"
        description: "Inject from template file"
      - cmd: "echo \"db_url: postgres://{{ op://lcl/db/user }}:{{ op://lcl/db/pw }}@{{ op://lcl/db/host }}\" | op inject"
        description: "Concatenate multiple secrets"
      - cmd: "echo \"password: op://$env/db/password\" | env=prod op inject"
        description: "Use variables in references"
    related:
      - "read"
      - "run"
    notes: |
      Template syntax: {{ op://vault/item/field }}
      Remember to delete resolved files when done

  - name: "run"
    description: "Run command with secrets as environment variables"
    examples:
      - cmd: "export DB_PASSWORD=\"op://app-prod/db/password\" && op run -- printenv DB_PASSWORD"
        description: "Run with env var secret reference"
      - cmd: "op run --env-file=.env -- ./start-server.sh"
        description: "Load secrets from .env file"
      - cmd: "op run --no-masking -- printenv DB_PASSWORD"
        description: "Run without masking secrets in output"
    related:
      - "read"
      - "inject"
    notes: |
      Secrets in stdout/stderr are masked by default
      Use --env-file to load secrets from dotenv files
      Secret references in env vars are automatically resolved

  - name: "item get"
    description: "Get details about an item"
    examples:
      - cmd: "op item get <item-name>"
        description: "Get item details"
      - cmd: "op item get <item-name> --vault <vault-name>"
        description: "Get item from specific vault"
      - cmd: "op item get <item-name> --fields label=username,label=password"
        description: "Get specific fields"
      - cmd: "op item get <item-name> --fields type=concealed"
        description: "Get fields by type"
      - cmd: "op item get <item-name> --otp"
        description: "Get one-time password"
      - cmd: "op item get <item-name> --format json"
        description: "Get as JSON"
      - cmd: "op item list --tags docs --format json | op item get -"
        description: "Get all items with tag"
    related:
      - "item list"
      - "read"
    notes: |
      Use --reveal to show concealed fields
      Pipe from 'op item list' to get multiple items

  - name: "item list"
    description: "List items in vaults"
    examples:
      - cmd: "op item list"
        description: "List all items"
      - cmd: "op item list --vault <vault-name>"
        description: "List items in specific vault"
      - cmd: "op item list --categories Login"
        description: "List only Login items"
      - cmd: "op item list --tags <tag>"
        description: "List items with tag"
      - cmd: "op item list --favorite"
        description: "List favorite items"
      - cmd: "op item list --format json"
        description: "List as JSON"
      - cmd: "op item list --include-archive"
        description: "Include archived items"
    related:
      - "item get"
      - "vault list"
    notes: |
      Categories: Login, Password, API Credential, SSH Key, Database, etc.
      Excludes Archive by default

  - name: "item create"
    description: "Create a new item"
    examples:
      - cmd: "op item create --category Login --title \"New Login\""
        description: "Create a login item"
      - cmd: "op item create --category Login --vault <vault> --title \"App\" username=user password=pass"
        description: "Create login with fields"
    related:
      - "item edit"

  - name: "item edit"
    description: "Edit an item"
    examples:
      - cmd: "op item edit <item-name> password=newpass"
        description: "Update a field"
      - cmd: "op item edit <item-name> --vault <vault>"
        description: "Edit item in specific vault"
    related:
      - "item create"
      - "item get"

  - name: "vault list"
    description: "List all vaults"
    examples:
      - cmd: "op vault list"
        description: "List all vaults"
      - cmd: "op vault list --format json"
        description: "List vaults as JSON"
    related:
      - "item list"

  - name: "vault get"
    description: "Get vault details"
    examples:
      - cmd: "op vault get <vault-name>"
        description: "Get vault details"
    related:
      - "vault list"

  - name: "whoami"
    description: "Get information about signed-in account"
    examples:
      - cmd: "op whoami"
        description: "Show current account info"
    notes: |
      Useful to verify you're signed in

resources:
  - name: "Official Docs"
    url: "https://developer.1password.com/docs/cli"
  - name: "Secret References"
    url: "https://developer.1password.com/docs/cli/secret-references"
